<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Туризм России 2026</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Onest:wght@100..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Design Tokens - Dark Mode (Default) - Slightly lighter */
            --bg: #1C1B19;
            --surface: #242321;
            --surface-hover: #2D2C2A;
            --text: #F7F6F2;
            --text-muted: #a1a1aa;
            --accent: #01696F;
            --accent-soft: rgba(1, 105, 111, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.4), 0 2px 8px -1px rgba(0, 0, 0, 0.2);
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Onest', sans-serif;
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            /* Design Tokens - Light Mode - Slightly more subdued */
            --bg: #F0EFEA;
            --surface: #F7F6F2;
            --surface-hover: #EBEAE5;
            --text: #171614;
            --text-muted: #71717a;
            --accent: #01696F;
            --accent-soft: rgba(1, 105, 111, 0.08);
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 300ms ease, color 300ms ease;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: 400;
            line-height: 1.1;
        }

        .display-medium { font-size: clamp(1.6rem, 5vw, 2.25rem); letter-spacing: -0.01em; }
        .text-body { font-size: clamp(0.9rem, 1.8vw + 0.4rem, 1.05rem); }
        .text-small { font-size: clamp(0.8rem, 1.2vw + 0.4rem, 0.9rem); }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: clamp(20px, 5vw, 32px);
            flex: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background-color: var(--surface-hover);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            gap: 8px;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        /* Data Table */
        .table-container {
            margin-top: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--surface-hover);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            font-size: 0.9375rem;
            transition: background-color var(--transition);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--surface-hover);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .user-name {
            font-weight: 600;
            color: var(--text);
        }

        .user-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .answers-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            color: var(--accent);
        }

        .answers-cell:hover {
            text-decoration: underline;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            transform: translateY(20px);
            transition: transform 200ms ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .modal-close:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .answer-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .answer-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .answer-q {
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }

        .answer-a {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="./index.html" class="btn btn-ghost" style="padding: 8px;">
                <i data-lucide="arrow-left" size="18"></i>
            </a>
            <h1 class="display-medium" style="margin: 0;">Админ-панель</h1>
        </div>
        <div class="header-actions">
            <button id="downloadCsvBtn" class="btn btn-primary">
                <i data-lucide="download" size="16"></i> Экспорт CSV
            </button>
            <a href="./dashboard.html" class="btn btn-ghost">
                <i data-lucide="bar-chart-2" size="16"></i> Дашборд
            </a>
            <button id="logoutBtn" class="btn btn-ghost" style="color: #ef4444;">
                <i data-lucide="log-out" size="16"></i> Выйти
            </button>
            <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                <i data-lucide="moon" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <main class="container">
        <p style="color: var(--text-muted);">
            Здесь отображаются все собранные анкеты. Кликните на "Посмотреть ответы", чтобы увидеть детали.
        </p>

        <div class="table-container">
            <table id="responsesTable">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Пользователь</th>
                        <th>Контакты</th>
                        <th>Ответы</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal for viewing full answers -->
    <div class="modal-overlay" id="answersModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn">
                <i data-lucide="x" size="20"></i>
            </button>
            <h2 class="display-medium" style="margin-bottom: 24px;" id="modalTitle">Ответы пользователя</h2>
            <div id="modalBody">
                <!-- Answers injected here -->
            </div>
        </div>
    </div>

    <script>
        // Check Admin Login with 15-minute session persistence
        function checkAdminSession() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const expiry = localStorage.getItem('admin_session_expiry');
            const now = new Date().getTime();

            if (!isLoggedIn || !expiry || now > parseInt(expiry)) {
                localStorage.removeItem('admin_logged_in');
                localStorage.removeItem('admin_session_expiry');
                window.location.href = './index.html#admin';
                return false;
            }
            
            // Extend session on activity
            const newExpiry = now + (15 * 60 * 1000);
            localStorage.setItem('admin_session_expiry', newExpiry.toString());
            return true;
        }

        if (!checkAdminSession()) {
            // Stop execution if not logged in
            throw new Error('Unauthorized');
        }

        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeIcon.setAttribute('data-lucide', newTheme === 'dark' ? 'moon' : 'sun');
            lucide.createIcons();
        }

        themeToggle.addEventListener('click', toggleTheme);
        lucide.createIcons();

        // Data Management
        let responses = [];

        function loadData() {
            responses = JSON.parse(localStorage.getItem('survey_responses_2026') || '[]');
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (responses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 32px;">Нет данных</td></tr>';
                return;
            }

            // Sort by date descending
            responses.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            responses.forEach((r, index) => {
                const tr = document.createElement('tr');
                
                const date = new Date(r.timestamp).toLocaleString('ru-RU', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                const userInfo = r.userInfo || { name: 'Аноним', company: '-', position: '-', email: '-' };

                tr.innerHTML = `
                    <td style="color: var(--text-muted); font-size: 0.875rem;">${date}</td>
                    <td>
                        <div class="user-info">
                            <span class="user-name">${userInfo.name}</span>
                            <span class="user-meta">${userInfo.position} @ ${userInfo.company}</span>
                        </div>
                    </td>
                    <td>
                        <a href="mailto:${userInfo.email}" style="color: var(--accent); text-decoration: none; font-size: 0.875rem;">${userInfo.email}</a>
                    </td>
                    <td>
                        <span class="answers-cell" onclick="showAnswers(${index})">Посмотреть ответы (${Object.keys(r.answers || {}).length})</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Modal Logic
        const modal = document.getElementById('answersModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        const closeModalBtn = document.getElementById('closeModalBtn');

        function showAnswers(index) {
            const r = responses[index];
            const userInfo = r.userInfo || { name: 'Аноним' };
            modalTitle.textContent = `Ответы: ${userInfo.name}`;
            modalBody.innerHTML = '';

            if (!r.answers || Object.keys(r.answers).length === 0) {
                modalBody.innerHTML = '<p style="color: var(--text-muted);">Нет ответов</p>';
            } else {
                // We need the questions array to map IDs to text. 
                // For a real app, this should be shared or fetched from an API.
                // Here we use a simplified version for demonstration.
                const questionsMap = {
                    1: "Ваша роль в туристической отрасли",
                    2: "С какими направлениями вы работаете преимущественно?",
                    3: "Ваш основной регион / география работы",
                    4: "Замечаете ли вы рост интереса к России на фоне нестабильности на Ближнем Востоке?",
                    5: "Туристы из каких регионов проявляют наибольший интерес к въезду в Россию?",
                    6: "Какие российские направления чаще всего запрашивают иностранные туристы?",
                    7: "Что является главным барьером для роста въездного туризма в Россию?",
                    8: "Каков типичный возраст активного внутреннего туриста в 2025–2026 году?",
                    9: "Какой стиль путешествий внутри страны преобладает сейчас?",
                    10: "Какой формат внутреннего туризма растёт быстрее всего?",
                    11: "Как изменился средний чек внутреннего туриста за последний год?",
                    12: "Какие регионы России покажут наибольший туристический рост в 2026 году?",
                    13: "Каков тренд выездного туризма из России в 2026 году?",
                    14: "Какие зарубежные направления наиболее популярны у российских туристов сейчас?",
                    15: "Как изменилось поведение российского выездного туриста за последние 2 года?",
                    16: "Какой цифровой инструмент реально влияет на вашу работу прямо сейчас?",

                const optionsMap = {

                    3: { "A": "Москва и Московская область", "B": "Санкт-Петербург и Северо-Запад", "C": "Краснодарский край / Черноморское побережье", "D": "Другой российский регион", "E": "Работаю на нескольких регионах / федеральный уровень", "Other": "Другое (свой вариант)" },
                    4: { "A": "Да — заметный рост запросов и реальных бронирований", "B": "Интерес есть, но до реального потока туристов далеко", "C": "Скорее нет — ситуация на Ближнем Востоке не влияет на Россию", "D": "Россия пока не воспринимается как альтернативное направление", "E": "Затрудняюсь ответить / не отслеживаю въездной туризм", "Other": "Другое (свой вариант)" },
                    5: { "A": "Страны Ближнего Востока (ОАЭ, Саудовская Аравия, Иран, Египет)", "B": "Страны СНГ (Казахстан, Узбекистан, Беларусь, Армения и др.)", "C": "Китай, Индия, страны Юго-Восточной Азии", "D": "Страны Африки и Латинской Америки", "E": "Интереса со стороны иностранных туристов практически нет", "Other": "Другое (свой вариант)" },

                    7: { "A": "Визовые ограничения и сложность оформления", "B": "Сложности с международными платежами и картами", "C": "Отсутствие прямых рейсов из ключевых стран", "D": "Негативный медиаобраз России за рубежом", "E": "Слабая инфраструктура и языковой барьер для иностранцев", "Other": "Другое (свой вариант)" },

                    14: { "A": "Турция, ОАЭ, Египет", "B": "Таиланд, Вьетнам, Индонезия, Индия", "C": "Страны СНГ (Казахстан, Узбекистан, Беларусь, Армения)", "D": "Китай, Куба, ЮАР, Латинская Америка", "E": "Европейские направления (через третьи страны)", "Other": "Другое (свой вариант)" },
                    15: { "A": "Больше самостоятельных поездок, меньше организованных туров", "B": "Переориентация на «дружественные» страны и СНГ", "C": "Рост спроса на длительные поездки (2 недели и больше)", "D": "Снижение среднего бюджета из-за курса и логистики", "E": "Аудитория сократилась, но оставшиеся тратят значительно больше", "Other": "Другое (свой вариант)" },
                    16: { "A": "ИИ-ассистенты и чат-боты для общения с клиентами", "B": "Онлайн-агрегаторы и системы бронирования", "C": "Системы динамического ценообразования", "D": "Аналитические платформы и BI-инструменты", "E": "Цифровые инструменты пока слабо влияют на мою работу", "Other": "Другое (свой вариант)" },
                    17: { "A": "Через онлайн-агрегаторы (Островок, Суточно, Яндекс Путешествия)", "B": "Напрямую на сайтах отелей и операторов", "C": "Через турагентов лично или по рекомендации", "D": "Через социальные сети и Telegram-каналы", "E": "Комбинируют несколько каналов одновременно", "Other": "Другое (свой вариант)" },
                    18: { "A": "😊 Очень благоприятный — отрасль активно растёт", "B": "🙂 Умеренно позитивный — рост есть, но с ограничениями", "C": "😐 Нейтральный — ситуация стабильная, без резких изменений", "D": "😟 Сложный — много препятствий для развития", "E": "😰 Критический — отрасль находится в кризисе", "Other": "Другое (свой вариант)" },
                    19: { "A": "Высокие цены на перелёты и транспортную доступность регионов", "B": "Недостаточное качество сервиса и инфраструктуры", "C": "Нехватка квалифицированных кадров в отрасли", "D": "Слабая цифровизация и неудобные сервисы для туристов", "E": "Недостаточная государственная поддержка и субсидирование", "Other": "Другое (свой вариант)" }
                };

                Object.keys(r.answers).forEach(qId => {
                    const ans = r.answers[qId];
                    const qText = questionsMap[qId] || `Вопрос ${qId}`;
                    
                    let answerTexts = ans.options.map(optId => {
                        return optionsMap[qId] && optionsMap[qId][optId] ? optionsMap[qId][optId] : optId;
                    });
                    
                    if (ans.otherText) {
                        answerTexts.push(`Свой ответ: ${ans.otherText}`);
                    }

                    const div = document.createElement('div');
                    div.className = 'answer-item';
                    div.innerHTML = `
                        <div class="answer-q">${qText}</div>
                        <div class="answer-a">${answerTexts.join('<br>')}</div>
                    `;
                    modalBody.appendChild(div);
                });
            }

            modal.classList.add('active');
        }

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // CSV Export
        document.getElementById('downloadCsvBtn').addEventListener('click', () => {
            if (responses.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // BOM for Excel
            
            // Header
            csvContent += "ID Сессии,Дата,Имя,Компания,Должность,Email,Вопрос ID,Ответы\n";

            responses.forEach(r => {
                const sessionId = r.sessionId || 'N/A';
                const timestamp = r.timestamp || new Date().toISOString();
                const u = r.userInfo || { name: '', company: '', position: '', email: '' };
                
                Object.keys(r.answers || {}).forEach(qId => {
                    const ans = r.answers[qId];
                    let answerTexts = ans.options.join('; ');
                    if (ans.otherText) {
                        answerTexts += `; Свой ответ: ${ans.otherText}`;
                    }
                    
                    // Escape quotes
                    const escapedA = answerTexts.replace(/"/g, '""');
                    
                    csvContent += `"${sessionId}","${timestamp}","${u.name}","${u.company}","${u.position}","${u.email}","${qId}","${escapedA}"\n`;
                });
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `tourism_survey_all_responses_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Init
        loadData();

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_logged_in');
            window.location.href = './index.html';
        });
    </script>
</body>
</html>
