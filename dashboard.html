<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд — Туризм России 2026</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Onest:wght@100..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Design Tokens - Dark Mode (Default) */
            --bg: #171614;
            --surface: #1f1e1c;
            --surface-hover: #2a2926;
            --text: #F7F6F2;
            --text-muted: #a1a1aa;
            --accent: #01696F;
            --accent-soft: rgba(1, 105, 111, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.4), 0 2px 8px -1px rgba(0, 0, 0, 0.2);
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Onest', sans-serif;
            --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #F7F6F2;
            --surface: #ffffff;
            --surface-hover: #f9f9f7;
            --text: #171614;
            --text-muted: #71717a;
            --accent: #01696F;
            --accent-soft: rgba(1, 105, 111, 0.08);
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 300ms ease, color 300ms ease;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: 400;
            line-height: 1.1;
        }

        .display-medium { font-size: clamp(1.75rem, 5vw, 2.5rem); }
        .text-body { font-size: clamp(0.875rem, 2vw + 0.5rem, 1.125rem); }
        .text-small { font-size: clamp(0.75rem, 1.5vw + 0.4rem, 0.875rem); }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: clamp(16px, 4vw, 24px);
            flex: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background-color: var(--surface-hover);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            gap: 8px;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
            gap: clamp(16px, 3vw, 24px);
            margin-top: clamp(24px, 4vw, 32px);
        }

        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .summary-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }

        .summary-card .sub-value {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: clamp(16px, 3vw, 24px);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .chart-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.15), 0 4px 12px -2px rgba(0, 0, 0, 0.1);
            border-color: var(--accent-soft);
        }

        .chart-title {
            margin-bottom: 16px;
            color: var(--text);
            font-size: clamp(1rem, 2vw, 1.1rem);
            font-weight: 500;
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        .chart-container {
            position: relative;
            height: clamp(250px, 40vh, 350px);
            width: 100%;
            flex: 1;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
            gap: clamp(16px, 3vw, 24px);
            margin-top: clamp(24px, 4vw, 32px);
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: clamp(16px, 3vw, 24px);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            color: var(--accent);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
        }
        @media (max-width: 600px) {
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="./index.html" class="btn btn-ghost" style="padding: 8px;">
                <i data-lucide="arrow-left" size="18"></i>

    <main class="container">
        <p style="color: var(--text-muted); max-width: 600px; margin-bottom: 24px;">
            Здесь представлены агрегированные и анонимные результаты опроса «Туризм России 2026». Данные обновляются в реальном времени с каждым новым участником.
        </p>

        <div id="summarySection" class="summary-row" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 32px;">
            <!-- Summary cards will be injected here -->
        </div>

        <div id="summaryCharts" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 32px;">
            <div class="chart-card" id="sentimentChartCard">

            </div>
            <div class="chart-card" id="rolesChartCard">

            <div class="chart-card" id="digitalChartCard">

            </div>
            <div class="chart-card" id="bookingChartCard">

                <div class="chart-container">

        </div>

        <div class="dashboard-grid" id="chartsContainer">
            <!-- Charts will be injected here -->
        </div>
    </main>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeIcon.setAttribute('data-lucide', newTheme === 'dark' ? 'moon' : 'sun');
            lucide.createIcons();
            
            // Update charts theme
            Chart.defaults.color = newTheme === 'dark' ? '#a1a1aa' : '#71717a';
            Chart.defaults.borderColor = newTheme === 'dark' ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.08)';
            renderCharts(); // Re-render to apply theme
        }

        themeToggle.addEventListener('click', toggleTheme);
        lucide.createIcons();

        // Chart.js Defaults

            18: { "A": "😊 Очень благоприятный — отрасль активно растёт", "B": "🙂 Умеренно позитивный — рост есть, но с ограничениями", "C": "😐 Нейтральный — ситуация стабильная, без резких изменений", "D": "😟 Сложный — много препятствий для развития", "E": "😰 Критический — отрасль находится в кризисе", "Other": "Другое" },
            19: { "A": "Высокие цены на перелёты и транспортную доступность регионов", "B": "Недостаточное качество сервиса и инфраструктуры", "C": "Нехватка квалифицированных кадров в отрасли", "D": "Слабая цифровизация и неудобные сервисы для туристов", "E": "Недостаточная государственная поддержка и субсидирование", "Other": "Другое" }
        };

        let chartInstances = {};

        function loadData() {
            const responses = JSON.parse(localStorage.getItem('survey_responses_2026') || '[]');
            
            // Update Stats in Header
            document.getElementById('totalResponsesHeader').textContent = responses.length;
            
            return responses;
        }

        function renderCharts() {
            const responses = loadData();
            const container = document.getElementById('chartsContainer');
            const summaryContainer = document.getElementById('summarySection');
            
            // Clear existing charts if re-rendering for theme change
            if (Object.keys(chartInstances).length > 0) {
                Object.values(chartInstances).forEach(chart => chart.destroy());
                chartInstances = {};
                container.innerHTML = '';
                summaryContainer.innerHTML = '';
            }

            if (responses.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 48px;">Пока нет данных для отображения. Будьте первым!</p>';
                summaryContainer.style.display = 'none';
                document.getElementById('summaryCharts').style.display = 'none';
                return;
            }

            summaryContainer.style.display = 'grid';
            document.getElementById('summaryCharts').style.display = 'grid';

            // Calculate Summary Data
            const calculateTopOption = (questionId) => {
                const counts = {};
                responses.forEach(r => {
                    if (r.answers[questionId] && r.answers[questionId].options) {
                        r.answers[questionId].options.forEach(opt => {
                            counts[opt] = (counts[opt] || 0) + 1;
                        });
                    }
                });
                const topKey = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, null);
                return topKey ? { text: optionsMap[questionId][topKey], count: counts[topKey] } : null;
            };

            const topBarrier = calculateTopOption(19);
            const topRegion = calculateTopOption(12);
            const topTrend = calculateTopOption(10);

            const createSummaryCard = (label, value, subValue) => {
                const card = document.createElement('div');
                card.className = 'summary-card';
                card.innerHTML = `
                    <div class="label">${label}</div>
                    <div class="value">${value}</div>
                    <div class="sub-value">${subValue}</div>
                `;
                return card;
            };

            if (topBarrier) summaryContainer.appendChild(createSummaryCard('Главный барьер', topBarrier.text, `${Math.round((topBarrier.count / responses.length) * 100)}% голосов`));
            if (topRegion) summaryContainer.appendChild(createSummaryCard('Регион-лидер 2026', topRegion.text, `${Math.round((topRegion.count / responses.length) * 100)}% голосов`));
            if (topTrend) summaryContainer.appendChild(createSummaryCard('Главный тренд', topTrend.text, `${Math.round((topTrend.count / responses.length) * 100)}% голосов`));

            const colors = [
                '#01696F', // accent
                '#F27D26', // orange
                '#34A853', // green
                '#EA4335', // red
                '#FBBC05', // yellow
                '#8E9299'  // gray
            ];

            // Helper to get chart data
            const getChartData = (qId) => {
                const counts = {};
                Object.keys(optionsMap[qId]).forEach(k => counts[k] = 0);
                responses.forEach(r => {
                    if (r.answers[qId] && r.answers[qId].options) {
                        r.answers[qId].options.forEach(opt => {
                            if (counts[opt] !== undefined) counts[opt]++;
                        });
                    }
                });
                const labels = [];
                const data = [];
                const bgColors = [];
                let colorIndex = 0;
                Object.keys(counts).forEach(key => {
                    if (counts[key] > 0) {
                        labels.push(optionsMap[qId][key]);
                        data.push(counts[key]);
                        bgColors.push(colors[colorIndex % colors.length]);
                        colorIndex++;
                    }
                });
                return { labels, data, bgColors };
            };

            // Render Summary Charts
            const summaryChartsConfig = [
                { id: 18, canvasId: 'sentimentChart', type: 'pie' },
                { id: 1, canvasId: 'rolesChart', type: 'bar' },
                { id: 16, canvasId: 'digitalChart', type: 'doughnut' },
                { id: 17, canvasId: 'bookingChart', type: 'bar' }
            ];

            summaryChartsConfig.forEach(config => {
                const { labels, data, bgColors } = getChartData(config.id);
                if (data.length === 0) {
                    document.getElementById(config.canvasId + 'Card').style.display = 'none';
                    return;
                }
                document.getElementById(config.canvasId + 'Card').style.display = 'flex';
                const ctx = document.getElementById(config.canvasId).getContext('2d');
                chartInstances[config.canvasId] = new Chart(ctx, {
                    type: config.type,
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: config.type === 'bar' ? colors[0] : bgColors,
                            borderWidth: 1,
                            borderRadius: config.type === 'bar' ? 4 : 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: config.type !== 'bar',
                                position: window.innerWidth < 600 ? 'bottom' : 'right',
                                labels: { boxWidth: 12, font: { size: 11 } }
                            }
                        },
                        scales: config.type === 'bar' ? {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } },
                            x: { display: false }
                        } : undefined
                    }
                });
            });

            // Render Detailed Charts
            const summaryIds = summaryChartsConfig.map(c => c.id);
            questionsData.filter(q => !summaryIds.includes(q.id)).forEach(qData => {
                const { labels, data, bgColors } = getChartData(qData.id);
                if (data.length === 0) return;

                // Create DOM elements
                const card = document.createElement('div');
                card.className = 'chart-card';
                const title = document.createElement('div');
                title.className = 'chart-title';
                title.textContent = qData.text;
                const chartWrapper = document.createElement('div');
                chartWrapper.className = 'chart-container';
                const canvas = document.createElement('canvas');
                chartWrapper.appendChild(canvas);
                card.appendChild(title);
                card.appendChild(chartWrapper);
                container.appendChild(card);

                const ctx = canvas.getContext('2d');
                chartInstances[qData.id] = new Chart(ctx, {
                    type: qData.type,
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: qData.type === 'bar' ? colors[0] : bgColors,
                            borderWidth: 1,
                            borderRadius: qData.type === 'bar' ? 4 : 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: qData.type !== 'bar',
                                position: window.innerWidth < 600 ? 'bottom' : 'right',
                                labels: { boxWidth: 12, font: { size: 11 } }
                            }
                        },
                        scales: qData.type === 'bar' ? {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } },
                            x: { display: false }
                        } : undefined
                    }
                });
            });
        }

        // Initial render
        renderCharts();

        // Handle resize for legend position
        let lastWidth = window.innerWidth;
        window.addEventListener('resize', () => {
            const currentWidth = window.innerWidth;
            if ((lastWidth < 600 && currentWidth >= 600) || (lastWidth >= 600 && currentWidth < 600)) {
                renderCharts();
            }
            lastWidth = currentWidth;
        });
    </script>
</body>
</html>
