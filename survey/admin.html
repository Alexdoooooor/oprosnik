<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Onest:wght@100..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./i18n.js"></script>
    <style>
        @import "tailwindcss";
        :root {
            /* Design Tokens - Dark Mode (Default) */
            --bg: #1C1B19;
            --surface: #242321;
            --surface-hover: #2D2C2A;
            --text: #F7F6F2;
            --text-muted: #a1a1aa;
            --accent: #01696F;
            --accent-soft: rgba(1, 105, 111, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.4), 0 2px 8px -1px rgba(0, 0, 0, 0.2);
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Onest', sans-serif;
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);

            /* Layout Tokens */
            --container-max-width: 1200px;
            --header-height: 72px;
            --section-padding-block: 80px;
            --section-padding-inline: 24px;
        }

        [data-theme="light"] {
            /* Design Tokens - Light Mode */
            --bg: #F0EFEA;
            --surface: #F7F6F2;
            --surface-hover: #EBEAE5;
            --text: #171614;
            --text-muted: #71717a;
            --accent: #01696F;
            --accent-soft: rgba(1, 105, 111, 0.08);
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            max-width: 100vw;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.5;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            transition: background-color 300ms ease, color 300ms ease;
            word-break: break-word;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: 400;
            line-height: 1.1;
        }

        .display-medium { font-size: clamp(1.6rem, 5vw, 2.25rem); letter-spacing: -0.01em; }
        .text-body { font-size: clamp(0.9rem, 1.8vw + 0.4rem, 1.05rem); }
        .text-small { font-size: clamp(0.8rem, 1.2vw + 0.4rem, 0.9rem); }

        /* Layout */
        .container-custom {
            max-width: var(--container-max-width);
            margin-inline: auto;
            padding-inline: var(--section-padding-inline);
            width: 100%;
        }

        .section-padding {
            padding-block: var(--section-padding-block);
        }

        @media (max-width: 768px) {
            :root {
                --section-padding-block: 40px;
                --header-height: 60px;
            }
            .hide-mobile { display: none; }
            .mobile-menu-toggle {
                display: flex;
                background: none;
                border: none;
                color: var(--text);
                padding: 8px;
                cursor: pointer;
            }
            .mobile-menu {
                display: none;
                position: absolute;
                top: var(--header-height);
                right: 0;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 0 0 12px 12px;
                padding: 16px;
                flex-direction: column;
                gap: 16px;
                z-index: 999;
                box-shadow: var(--shadow);
                min-width: 200px;
            }
            .mobile-menu.active {
                display: flex;
            }
            .modal-content { padding: 24px; }
            
            .table-container { background: transparent; border: none; box-shadow: none; margin-top: 16px; }
            .table-scroll { overflow: visible; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
            td { padding: 8px 0; border: none; display: flex; justify-content: space-between; align-items: center; }
            td::before { content: attr(data-label); font-weight: 600; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; }
        }
        @media (min-width: 769px) {
            .mobile-menu-toggle { display: none; }
            .mobile-menu { display: none; }
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background-color: var(--surface-hover);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        /* Table */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-top: 32px;
        }

        .table-scroll {
            overflow-x: auto;
            max-height: 70vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            text-align: left;
        }

        th {
            background: var(--surface-hover);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--surface-hover);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-accent {
            background: var(--accent-soft);
            color: var(--accent);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            padding: 32px;
            position: relative;
            transform: translateY(20px);
            transition: transform var(--transition);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .modal-body {
            overflow-y: auto;
            padding-right: 8px;
        }

        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .answer-item {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .answer-item:last-child {
            border-bottom: none;
        }

        .answer-q {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .answer-a {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all var(--transition);
        }

        .modal-close:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        @media (max-width: 600px) {
            .hide-mobile { display: none; }
            .modal-content { padding: 24px; }
        }
    </style>
</head>

    <script>
        // Check Admin Login with 15-minute session persistence
        function checkAdminSession() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const expiry = localStorage.getItem('admin_session_expiry');
            const now = new Date().getTime();

            if (!isLoggedIn || !expiry || now > parseInt(expiry)) {
                localStorage.removeItem('admin_logged_in');
                localStorage.removeItem('admin_session_expiry');
                window.location.href = './index.html#admin';
                return false;
            }
            
            // Extend session on activity
            const newExpiry = now + (15 * 60 * 1000);
            localStorage.setItem('admin_session_expiry', newExpiry.toString());
            return true;
        }

        if (!checkAdminSession()) {
            // Stop execution if not logged in
            throw new Error('Unauthorized');
        }

        // Mobile Menu

        const mobileMenu = document.querySelector('.mobile-menu');
        
        mobileMenuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
        });

        // Mobile Menu Actions
        document.getElementById('mobileDownloadCsvBtn').addEventListener('click', () => {
            document.getElementById('downloadCsvBtn').click();
            mobileMenu.classList.remove('active');
        });
        document.getElementById('mobileLogoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_logged_in');
            window.location.href = '/survey/index.html';

        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const mobileThemeToggle = document.getElementById('mobileThemeToggle');
        const mobileThemeIcon = document.getElementById('mobileThemeIcon');
        
        function updateThemeIcons(theme) {
            const iconName = theme === 'dark' ? 'sun' : 'moon';
            themeIcon.setAttribute('data-lucide', iconName);
            mobileThemeIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcons(newTheme);
        }

        themeToggle.addEventListener('click', toggleTheme);
        mobileThemeToggle.addEventListener('click', toggleTheme);

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcons(savedTheme);

            8: { "A": "18–25 лет (молодёжь, студенты)", "B": "25–35 лет (молодые профессионалы и пары)", "C": "35–50 лет (семьи с детьми, средний класс)", "D": "50+ лет (зрелые путешественники, пенсионеры)", "E": "Все возрасты в равной степени", "Other": "Другое" },
            9: { "A": "Самостоятельные поездки без турагентства", "B": "Организованные туры и пакетные предложения", "C": "Комбинированные поездки (частично самостоятельно, частично через агента)", "D": "Корпоративные и деловые поездки (MICE)", "E": "Групповые туры для узких аудиторий (молодёжь, seniors, тематические)", "Other": "Другое" },
            10: { "A": "Экотуризм, глэмпинг и природный отдых", "B": "Гастрономический и культурный туризм", "C": "Активный туризм (треккинг, горы, сплавы)", "D": "Велнес и оздоровительные курорты", "E": "Короткие городские поездки (уик-энд в другом городе)", "Other": "Другое" },
            11: { "A": "Вырос более чем на 20%", "B": "Вырос незначительно — в пределах 10–20%", "C": "Остался примерно на прежнем уровне", "D": "Снизился — туристы стали экономить", "E": "Затрудняюсь оценить", "Other": "Другое" },
            12: { "A": "Краснодарский край и Крым", "B": "Санкт-Петербург и Ленинградская область", "C": "Алтай, Байкал, Сибирь", "D": "Татарстан, Поволжье, Урал", "E": "Дальний Восток и Арктические маршруты", "Other": "Другое" },
            13: { "A": "Активный рост — россияне едут за рубеж больше, чем раньше", "B": "Незначительный рост", "C": "Стагнация — уровень примерно как в 2025 году", "D": "Снижение — больше переориентации на внутренний туризм", "E": "Затрудняюсь оценить", "Other": "Другое" },
            14: { "A": "Турция, ОАЭ, Египет", "B": "Таиланд, Вьетнам, Индонезия, Индия", "C": "Страны СНГ (Казахстан, Узбекистан, Беларусь, Армения)", "D": "Китай, Куба, ЮАР, Латинская Америка", "E": "Европейские направления (через третьи страны)", "Other": "Другое" },
            15: { "A": "Больше самостоятельных поездок, меньше организованных туров", "B": "Переориентация на «дружественные» страны и СНГ", "C": "Рост спроса на длительные поездки (2 недели и больше)", "D": "Снижение среднего бюджета из-за курса и логистики", "E": "Аудитория сократилась, но оставшиеся тратят значительно больше", "Other": "Другое" },
            16: { "A": "ИИ-ассистенты и чат-боты для общения с клиентами", "B": "Онлайн-агрегаторы и системы бронирования", "C": "Системы динамического ценообразования", "D": "Аналитические платформы и BI-инструменты", "E": "Цифровые инструменты пока слабо влияют на мою работу", "Other": "Другое" },
            17: { "A": "Через онлайн-агрегаторы (Островок, Суточно, Яндекс Путешествия)", "B": "Напрямую на сайтах отелей и операторов", "C": "Через турагентов лично или по рекомендации", "D": "Через социальные сети и Telegram-каналы", "E": "Комбинируют несколько каналов одновременно", "Other": "Другое" },
            18: { "A": "😊 Очень благоприятный — отрасль активно растёт", "B": "🙂 Умеренно позитивный — рост есть, но с ограничениями", "C": "😐 Нейтральный — ситуация стабильная, без резких изменений", "D": "😟 Сложный — много препятствий для развития", "E": "😰 Критический — отрасль находится в кризисе", "Other": "Другое" },
            19: { "A": "Высокие цены на перелёты и транспортную доступность регионов", "B": "Недостаточное качество сервиса и инфраструктуры", "C": "Нехватка квалифицированных кадров в отрасли", "D": "Слабая цифровизация и неудобные сервисы для туристов", "E": "Недостаточная государственная поддержка и субсидирование", "Other": "Другое" }
        };

        function loadData() {
            responses = JSON.parse(localStorage.getItem('survey_responses_2026') || '[]');
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (responses.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 32px;">${t('admin_no_data')}</td></tr>`;
                return;
            }

            // Sort by date descending
            responses.sort((a, b) => {
                const dateA = a.timestamp ? new Date(a.timestamp).getTime() : 0;
                const dateB = b.timestamp ? new Date(b.timestamp).getTime() : 0;
                return dateB - dateA;
            });

            const lang = localStorage.getItem('lang') || 'ru';
            const locale = lang === 'en' ? 'en-US' : 'ru-RU';

            responses.forEach((r, index) => {
                const tr = document.createElement('tr');
                
                const timestamp = r.timestamp ? new Date(r.timestamp) : new Date();
                const date = timestamp.toLocaleString(locale, {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                const userInfo = r.userInfo || { name: t('admin_anon'), company: '-', position: '-', email: '-' };

                tr.innerHTML = `
                    <td data-label="${t('admin_table_date')}" style="color: var(--text-muted); font-size: 0.875rem;">${date}</td>
                    <td data-label="${t('admin_table_user')}">
                        <div class="user-info">
                            <span class="user-name">${userInfo.name}</span>
                            <span class="user-meta">${userInfo.position} @ ${userInfo.company}</span>
                        </div>
                    </td>
                    <td data-label="${t('admin_table_contacts')}">
                        <a href="mailto:${userInfo.email}" style="color: var(--accent); text-decoration: none; font-size: 0.875rem;">${userInfo.email}</a>
                    </td>
                    <td data-label="${t('admin_table_answers')}">
                        <button class="btn btn-ghost" style="padding: 4px 12px; font-size: 0.75rem;" onclick="showAnswers(${index})">${t('admin_view_answers')} (${Object.keys(r.answers || {}).length})</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Modal Logic
        const modal = document.getElementById('answersModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        const closeModalBtn = document.getElementById('closeModalBtn');

        function showAnswers(index) {
            const r = responses[index];
            const userInfo = r.userInfo || { name: t('admin_anon') };
            modalTitle.textContent = `${t('admin_modal_title')}: ${userInfo.name}`;
            modalBody.innerHTML = '';

            if (!r.answers || Object.keys(r.answers).length === 0) {
                modalBody.innerHTML = `<p style="color: var(--text-muted);">${t('admin_no_answers')}</p>`;
            } else {
                Object.keys(r.answers).forEach(qId => {
                    const ans = r.answers[qId];
                    const qData = questionsData.find(q => q.id == qId);
                    const qText = qData ? qData.text : t(`q${qId}_text`);
                    
                    let answerTexts = ans.options.map(optId => {
                        return (optionsMap[qId] && optionsMap[qId][optId]) ? optionsMap[qId][optId] : t(`q${qId}_opt${optId}`);
                    });
                    
                    if (ans.otherText) {
                        answerTexts.push(`${t('admin_own_answer')}: ${ans.otherText}`);
                    }

                    const div = document.createElement('div');
                    div.className = 'answer-item';
                    div.innerHTML = `
                        <div class="answer-q">${qText}</div>
                        <div class="answer-a">${answerTexts.join('<br>')}</div>
                    `;
                    modalBody.appendChild(div);
                });
            }

            modal.classList.add('active');
        }

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // CSV Export
        document.getElementById('downloadCsvBtn').addEventListener('click', () => {
            if (responses.length === 0) {
                alert(t('admin_no_data'));
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // BOM for Excel
            
            // Header
            const headers = [
                t('csv_session_id'),
                t('csv_date'),
                t('csv_name'),
                t('csv_company'),
                t('csv_position'),
                t('csv_email'),
                t('csv_question_id'),
                t('csv_answers')
            ];
            csvContent += headers.join(',') + "\n";

            responses.forEach(r => {
                const sessionId = r.sessionId || 'N/A';
                const timestamp = r.timestamp || new Date().toISOString();
                const u = r.userInfo || { name: '', company: '', position: '', email: '' };
                
                Object.keys(r.answers || {}).forEach(qId => {
                    const ans = r.answers[qId];
                    let answerTexts = ans.options.map(optId => {
                        return (optionsMap[qId] && optionsMap[qId][optId]) ? optionsMap[qId][optId] : t(`q${qId}_opt${optId}`);
                    }).join('; ');
                    if (ans.otherText) {
                        answerTexts += `; ${t('csv_own_answer')}: ${ans.otherText}`;
                    }
                    
                    // Escape quotes
                    const escapedA = answerTexts.replace(/"/g, '""');
                    
                    csvContent += `"${sessionId}","${timestamp}","${u.name}","${u.company}","${u.position}","${u.email}","${qId}","${escapedA}"\n`;
                });
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `tourism_survey_all_responses_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Init
        loadData();

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_logged_in');
            window.location.href = '/survey/index.html';
        });
    </script>
</body>
</html>
