<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дашборд — Туризм России 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Onest:wght@100..900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    (function () {
      var isCompleted = localStorage.getItem('survey_completed_2026') === 'true';
      var isAdmin = localStorage.getItem('admin_logged_in') === 'true';
      if (!isCompleted && !isAdmin) {
        window.location.href = '../index.html';
      }
    })();
  </script>

  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────────── */
    :root {
      --bg:            #1c1b19;
      --surface:       #242321;
      --surface-hover: #2d2c2a;
      --text:          #f7f6f2;
      --text-muted:    #a1a1aa;
      --accent:        #01696f;
      --accent-soft:   rgba(1, 105, 111, 0.12);
      --border:        rgba(255, 255, 255, 0.08);
      --shadow:        0 4px 24px -1px rgba(0,0,0,.4), 0 2px 8px -1px rgba(0,0,0,.2);
      --font-display:  'Instrument Serif', serif;
      --font-body:     'Onest', sans-serif;
      --ease:          250ms cubic-bezier(0.4, 0, 0.2, 1);

      --container-max: 1200px;
      --header-h:      72px;
      --pad-block:     80px;
      --pad-inline:    24px;
      --r-sm:          8px;
      --r-md:          12px;
      --r-lg:          16px;
      --r-xl:          20px;
      --r-pill:        999px;
    }

    [data-theme="light"] {
      --bg:            #f0efea;
      --surface:       #f7f6f2;
      --surface-hover: #ebeae5;
      --text:          #171614;
      --text-muted:    #71717a;
      --accent:        #01696f;
      --accent-soft:   rgba(1, 105, 111, 0.08);
      --border:        rgba(0, 0, 0, 0.08);
      --shadow:        0 4px 24px -1px rgba(0,0,0,.05), 0 2px 8px -1px rgba(0,0,0,.03);
    }

    /* ─── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { max-width: 100vw; overflow-x: hidden; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background-color 300ms ease, color 300ms ease;
      word-break: break-word;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    h1, h2, h3 { font-family: var(--font-display); font-weight: 400; line-height: 1.1; }

    /* ─── TYPOGRAPHY ─────────────────────────────────────────── */
    .display-medium { font-size: clamp(1.6rem, 5vw, 2.25rem); letter-spacing: -0.01em; }
    .text-body  { font-size: clamp(0.9rem, 1.8vw + 0.4rem, 1.05rem); }
    .text-small { font-size: clamp(0.8rem, 1.2vw + 0.4rem, 0.9rem); }

    /* ─── LAYOUT ─────────────────────────────────────────────── */
    .container-custom {
      max-width: var(--container-max);
      margin-inline: auto;
      padding-inline: var(--pad-inline);
      width: 100%;
    }
    .section-padding { padding-block: var(--pad-block); }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .site-header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .header-inner {
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .header-left  { flex: 1 1 auto; }
    .header-right { flex: 0 0 auto; }

    .header-title {
      color: var(--text);
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── BUTTONS & ICON CONTROLS ────────────────────────────── */
    .icon-btn,
    .theme-toggle,
    .mobile-menu-toggle,
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background var(--ease), border-color var(--ease);
    }

    .icon-btn,
    .theme-toggle,
    .mobile-menu-toggle {
      width: 40px;
      height: 40px;
      padding: 0;
      flex-shrink: 0;
    }

    .btn {
      height: 40px;
      padding: 0 16px;
      font-weight: 600;
      font-size: 0.875rem;
    }

    .icon-btn:hover,
    .theme-toggle:hover,
    .mobile-menu-toggle:hover,
    .btn:hover {
      background: var(--surface-hover);
    }

    .header-stats {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: var(--r-pill);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ─── MOBILE MENU ────────────────────────────────────────── */
    .mobile-menu-toggle { display: none; }

    .mobile-menu {
      width: 100%;
      padding: 0 0 12px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .mobile-menu.is-open { display: block; }

    .mobile-menu-inner {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding-top: 8px;
    }

    /* ─── VISIBILITY HELPERS ─────────────────────────────────── */
    .hide-desktop   { display: none; }

    /* ─── MAIN ───────────────────────────────────────────────── */
    main {
      margin-top: var(--header-h);
      flex: 1;
    }

    /* ─── FILTERS ────────────────────────────────────────────── */
    .filters-block {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--r-xl);
      border: 1px solid var(--border);
      margin-bottom: 32px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 220px;
    }

    .filter-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-select {
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      width: 100%;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.9rem;
      transition: border-color var(--ease);
    }
    .filter-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ─── INTRO TEXT ─────────────────────────────────────────── */
    .dashboard-intro {
      color: var(--text-muted);
      max-width: 640px;
      margin-bottom: 40px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    /* ─── SUMMARY ROW ────────────────────────────────────────── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .summary-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .summary-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .summary-card .sub-value {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ─── CHART GRIDS ────────────────────────────────────────── */
    .summary-charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 450px), 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 450px), 1fr));
      gap: 24px;
      margin-top: 32px;
    }

    @media (min-width: 1200px) {
      .summary-charts-grid { grid-template-columns: repeat(2, 1fr); }
      .dashboard-grid       { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1600px) {
      .summary-charts-grid { grid-template-columns: repeat(4, 1fr); }
      .dashboard-grid       { grid-template-columns: repeat(3, 1fr); }
    }

    /* ─── CHART CARD ─────────────────────────────────────────── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: clamp(16px, 2vw, 24px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
    }

    .chart-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 48px -12px rgba(0,0,0,.2);
      border-color: var(--accent-soft);
    }

    .chart-title {
      margin-bottom: 16px;
      color: var(--text);
      font-size: clamp(1rem, 2vw, 1.1rem);
      font-weight: 500;
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .chart-container {
      position: relative;
      height: clamp(250px, 40vh, 350px);
      width: 100%;
      flex: 1;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 991px) {
      .hide-tablet-down { display: none !important; }
    }

    @media (max-width: 768px) {
      :root {
        --header-h:   64px;
        --pad-block:  40px;
        --pad-inline: 16px;
      }

      .hide-mobile          { display: none !important; }
      .hide-desktop         { display: inline-flex; }
      .mobile-menu-toggle   { display: inline-flex; }

      .header-inner { gap: 10px; }
      .header-left,
      .header-right { gap: 8px; }

      .filters-block { padding: 16px; gap: 16px; }
      .filter-group  { min-width: 100%; }
    }

    @media (max-width: 600px) {
      .chart-container { height: 280px; }
      .summary-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <!-- ─── SCRIPTS ────────────────────────────────────────────── -->
  <script>
  (function () {

    /* ── REFS ─────────────────────────────────────────────── */
    var html              = document.documentElement;
    var mobileMenuToggle  = document.getElementById('mobileMenuToggle');
    var mobileMenu        = document.getElementById('mobileMenu');
    var themeToggle       = document.getElementById('themeToggle');
    var mobileThemeToggle = document.getElementById('mobileThemeToggle');
    var themeIcon         = document.getElementById('themeIcon');
    var mobileThemeIcon   = document.getElementById('mobileThemeIcon');
    var statsDesktop      = document.getElementById('totalResponsesHeader');
    var statsMobile       = document.getElementById('totalResponsesHeaderMobile');

    /* ── LUCIDE ───────────────────────────────────────────── */
    function renderIcons() {
      if (window.lucide) lucide.createIcons();
    }

    /* ── THEME ────────────────────────────────────────────── */
    function syncThemeIcons(theme) {
      var name = theme === 'dark' ? 'sun' : 'moon';
      if (themeIcon)       themeIcon.setAttribute('data-lucide', name);
      if (mobileThemeIcon) mobileThemeIcon.setAttribute('data-lucide', name);
      renderIcons();
    }

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      syncThemeIcons(theme);
      if (window.Chart) {
        Chart.defaults.color       = theme === 'dark' ? '#a1a1aa' : '#71717a';
        Chart.defaults.borderColor = theme === 'dark'
          ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
      }
      if (typeof renderCharts === 'function') renderCharts();
    }

    function toggleTheme() {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    if (themeToggle)       themeToggle.addEventListener('click', toggleTheme);
    if (mobileThemeToggle) mobileThemeToggle.addEventListener('click', toggleTheme);

    /* ── MOBILE MENU ──────────────────────────────────────── */
    function setMenu(open) {
      if (!mobileMenu || !mobileMenuToggle) return;
      mobileMenu.hidden = !open;
      mobileMenu.classList.toggle('is-open', open);
      mobileMenuToggle.setAttribute('aria-expanded', String(open));
    }

    if (mobileMenuToggle) {
      mobileMenuToggle.addEventListener('click', function () {
        setMenu(mobileMenuToggle.getAttribute('aria-expanded') !== 'true');
      });

      document.addEventListener('click', function (e) {
        if (!mobileMenu.hidden
            && !mobileMenu.contains(e.target)
            && !mobileMenuToggle.contains(e.target)) {
          setMenu(false);
        }
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth > 768) setMenu(false);
      });
    }

    /* ── STATS SYNC ───────────────────────────────────────── */
    window.syncStats = function (n) {
      if (statsDesktop) statsDesktop.textContent = n;
      if (statsMobile)  statsMobile.textContent  = n;
    };

    /* ── INIT ─────────────────────────────────────────────── */
    applyTheme(localStorage.getItem('theme') || html.getAttribute('data-theme') || 'dark');
    setMenu(false);
    renderIcons();

  })();
  </script>

    6:  { A:"Москва и Санкт-Петербург (классический маршрут)", B:"Краснодарский край / Черноморское побережье", C:"Сибирь, Байкал, Дальний Восток", D:"Казань, Екатеринбург, Золотое кольцо", E:"Иностранцы пока не запрашивают конкретные направления", Other:"Другое" },
    7:  { A:"Визовые ограничения и сложность оформления", B:"Сложности с международными платежами и картами", C:"Отсутствие прямых рейсов из ключевых стран", D:"Негативный медиаобраз России за рубежом", E:"Слабая инфраструктура и языковой барьер для иностранцев", Other:"Другое" },
    8:  { A:"18–25 лет (молодёжь, студенты)", B:"25–35 лет (молодые профессионалы и пары)", C:"35–50 лет (семьи с детьми, средний класс)", D:"50+ лет (зрелые путешественники, пенсионеры)", E:"Все возрасты в равной степени", Other:"Другое" },
    9:  { A:"Самостоятельные поездки без турагентства", B:"Организованные туры и пакетные предложения", C:"Комбинированные поездки (частично самостоятельно, частично через агента)", D:"Корпоративные и деловые поездки (MICE)", E:"Групповые туры для узких аудиторий (молодёжь, seniors, тематические)", Other:"Другое" },
    10: { A:"Экотуризм, глэмпинг и природный отдых", B:"Гастрономический и культурный туризм", C:"Активный туризм (треккинг, горы, сплавы)", D:"Велнес и оздоровительные курорты", E:"Короткие городские поездки (уик-энд в другом городе)", Other:"Другое" },
    11: { A:"Вырос более чем на 20%", B:"Вырос незначительно — в пределах 10–20%", C:"Остался примерно на прежнем уровне", D:"Снизился — туристы стали экономить", E:"Затрудняюсь оценить", Other:"Другое" },
    12: { A:"Краснодарский край и Крым", B:"Санкт-Петербург и Ленинградская область", C:"Алтай, Байкал, Сибирь", D:"Татарстан, Поволжье, Урал", E:"Дальний Восток и Арктические маршруты", Other:"Другое" },
    13: { A:"Активный рост — россияне едут за рубеж больше, чем раньше", B:"Незначительный рост", C:"Стагнация — уровень примерно как в 2025 году", D:"Снижение — больше переориентации на внутренний туризм", E:"Затрудняюсь оценить", Other:"Другое" },
    14: { A:"Турция, ОАЭ, Египет", B:"Таиланд, Вьетнам, Индонезия, Индия", C:"Страны СНГ (Казахстан, Узбекистан, Беларусь, Армения)", D:"Китай, Куба, ЮАР, Латинская Америка", E:"Европейские направления (через третьи страны)", Other:"Другое" },
    15: { A:"Больше самостоятельных поездок, меньше организованных туров", B:"Переориентация на «дружественные» страны и СНГ", C:"Рост спроса на длительные поездки (2 недели и больше)", D:"Снижение среднего бюджета из-за курса и логистики", E:"Аудитория сократилась, но оставшиеся тратят значительно больше", Other:"Другое" },
    16: { A:"ИИ-ассистенты и чат-боты для общения с клиентами", B:"Онлайн-агрегаторы и системы бронирования", C:"Системы динамического ценообразования", D:"Аналитические платформы и BI-инструменты", E:"Цифровые инструменты пока слабо влияют на мою работу", Other:"Другое" },
    17: { A:"Через онлайн-агрегаторы (Островок, Суточно, Яндекс Путешествия)", B:"Напрямую на сайтах отелей и операторов", C:"Через турагентов лично или по рекомендации", D:"Через социальные сети и Telegram-каналы", E:"Комбинируют несколько каналов одновременно", Other:"Другое" },
    18: { A:"😊 Очень благоприятный — отрасль активно растёт", B:"🙂 Умеренно позитивный — рост есть, но с ограничениями", C:"😐 Нейтральный — ситуация стабильная, без резких изменений", D:"😟 Сложный — много препятствий для развития", E:"😰 Критический — отрасль находится в кризисе", Other:"Другое" },
    19: { A:"Высокие цены на перелёты и транспортную доступность регионов", B:"Недостаточное качество сервиса и инфраструктуры", C:"Нехватка квалифицированных кадров в отрасли", D:"Слабая цифровизация и неудобные сервисы для туристов", E:"Недостаточная государственная поддержка и субсидирование", Other:"Другое" }
  };

  var chartInstances = {};
  var COLORS = ['#01696F','#F27D26','#34A853','#EA4335','#FBBC05','#8E9299'];

  /* ── LOAD DATA ───────────────────────────────────────────── */
  function loadData() {
    var responses = JSON.parse(localStorage.getItem('survey_responses_2026') || '[]');
    if (window.syncStats) syncStats(responses.length);
    return responses;
  }

  /* ── POPULATE FILTERS ────────────────────────────────────── */
  function populateFilters() {
    var roleFilter   = document.getElementById('roleFilter');
    var regionFilter = document.getElementById('regionFilter');

    Object.entries(optionsMap[1]).forEach(function(kv) {
      var o = document.createElement('option');
      o.value = kv[0]; o.textContent = kv[1];
      roleFilter.appendChild(o);
    });

    Object.entries(optionsMap[3]).forEach(function(kv) {
      var o = document.createElement('option');
      o.value = kv[0]; o.textContent = kv[1];
      regionFilter.appendChild(o);
    });
  }

  populateFilters();

  /* ── RENDER CHARTS ───────────────────────────────────────── */
  function renderCharts() {
    var all          = loadData();
    var roleFilter   = document.getElementById('roleFilter').value;
    var regionFilter = document.getElementById('regionFilter').value;

    var responses = all.filter(function(r) {
      var roleOk   = roleFilter   === 'all' || (r.answers[1]  && r.answers[1].options.includes(roleFilter));
      var regionOk = regionFilter === 'all' || (r.answers[3]  && r.answers[3].options.includes(regionFilter));
      return roleOk && regionOk;
    });

    if (window.syncStats) syncStats(responses.length);

    var container       = document.getElementById('chartsContainer');
    var summarySection  = document.getElementById('summarySection');
    var summaryCharts   = document.getElementById('summaryCharts');

    /* destroy old */
    Object.values(chartInstances).forEach(function(c) { c.destroy(); });
    chartInstances = {};
    container.innerHTML = '';
    summarySection.innerHTML = '';

    if (responses.length === 0) {
      container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:48px">Нет данных для выбранных фильтров.</p>';
      summarySection.style.display = 'none';
      summaryCharts.style.display  = 'none';
      return;
    }

    summarySection.style.display = '';
    summaryCharts.style.display  = '';

    /* summary cards */
    function calcTop(qId) {
      var counts = {};
      responses.forEach(function(r) {
        if (r.answers[qId] && r.answers[qId].options) {
          r.answers[qId].options.forEach(function(opt) { counts[opt] = (counts[opt]||0)+1; });
        }
      });
      var keys = Object.keys(counts);
      if (!keys.length) return null;
      var top = keys.reduce(function(a,b){ return counts[a]>counts[b]?a:b; });
      return { text: optionsMap[qId][top], count: counts[top] };
    }

    function makeSummaryCard(label, value, sub) {
      var d = document.createElement('div');
      d.className = 'summary-card';
      d.innerHTML = '<div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub-value">'+sub+'</div>';
      return d;
    }

    var tb = calcTop(19), tr = calcTop(12), tt = calcTop(10);
    if (tb) summarySection.appendChild(makeSummaryCard('Главный барьер',   tb.text, Math.round(tb.count/responses.length*100)+'% голосов'));
    if (tr) summarySection.appendChild(makeSummaryCard('Регион-лидер 2026',tr.text, Math.round(tr.count/responses.length*100)+'% голосов'));
    if (tt) summarySection.appendChild(makeSummaryCard('Главный тренд',    tt.text, Math.round(tt.count/responses.length*100)+'% голосов'));

    /* chart data helper */
    function getChartData(qId) {
      var counts = {};
      Object.keys(optionsMap[qId]).forEach(function(k){ counts[k]=0; });
      responses.forEach(function(r) {
        if (r.answers[qId] && r.answers[qId].options) {
          r.answers[qId].options.forEach(function(opt){ if (counts[opt]!==undefined) counts[opt]++; });
        }
      });
      var labels=[], data=[], bg=[], ci=0;
      Object.keys(counts).forEach(function(k){
        if (counts[k]>0){
          labels.push(optionsMap[qId][k]);
          data.push(counts[k]);
          bg.push(COLORS[ci%COLORS.length]);
          ci++;
        }
      });
      return { labels:labels, data:data, bg:bg };
    }

    /* chart factory */
    function makeChart(ctx, type, labels, data, bg) {
      var isBar = type==='bar';
      var isMobile = window.innerWidth < 600;
      return new Chart(ctx, {
        type: type,
        data: {
          labels: labels,
          datasets: [{
            data: data,
            backgroundColor: isBar ? COLORS[0] : bg,
            borderWidth: 1,
            borderRadius: isBar ? 4 : 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: !isBar,
              position: isMobile ? 'bottom' : 'right',
              labels: { boxWidth: 12, font: { size: 11 } }
            }
          },
          scales: isBar ? {
            y: { beginAtZero: true, ticks: { stepSize: 1 } },
            x: { display: false }
          } : undefined
        }
      });
    }

    /* summary charts */
    var summaryConfig = [
      { id:18, canvasId:'sentimentChart', type:'pie'      },
      { id:1,  canvasId:'rolesChart',     type:'bar'      },
      { id:16, canvasId:'digitalChart',   type:'doughnut' },
      { id:17, canvasId:'bookingChart',   type:'bar'      }
    ];

    summaryConfig.forEach(function(cfg) {
      var cd = getChartData(cfg.id);
      var card = document.getElementById(cfg.canvasId+'Card');
      if (!cd.data.length) { card.style.display='none'; return; }
      card.style.display = 'flex';
      var ctx = document.getElementById(cfg.canvasId).getContext('2d');
      chartInstances[cfg.canvasId] = makeChart(ctx, cfg.type, cd.labels, cd.data, cd.bg);
    });

    /* detail charts */
    var summaryIds = summaryConfig.map(function(c){ return c.id; });
    questionsData
      .filter(function(q){ return !summaryIds.includes(q.id); })
      .forEach(function(qData) {
        var cd = getChartData(qData.id);
        if (!cd.data.length) return;

        var card    = document.createElement('div'); card.className = 'chart-card';
        var title   = document.createElement('div'); title.className = 'chart-title'; title.textContent = qData.text;
        var wrapper = document.createElement('div'); wrapper.className = 'chart-container';
        var canvas  = document.createElement('canvas');

        wrapper.appendChild(canvas);
        card.appendChild(title);
        card.appendChild(wrapper);
        container.appendChild(card);

        chartInstances[qData.id] = makeChart(canvas.getContext('2d'), qData.type, cd.labels, cd.data, cd.bg);
      });
  }

  /* ── FILTER LISTENERS ────────────────────────────────────── */
  document.getElementById('roleFilter').addEventListener('change', renderCharts);
  document.getElementById('regionFilter').addEventListener('change', renderCharts);

  /* ── RESIZE: re-render legend position ──────────────────── */
  var lastW = window.innerWidth;
  window.addEventListener('resize', function() {
    var w = window.innerWidth;
    if ((lastW < 600) !== (w < 600)) renderCharts();
    lastW = w;
  });

  /* ── INITIAL RENDER ──────────────────────────────────────── */
  renderCharts();
  </script>

</body>
</html>
